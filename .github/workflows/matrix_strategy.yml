name: matrix strategy workflow

on:
  push: 
    branches: [master]
  workflow_dispatch:
    
jobs:
  build:
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os: [ubuntu-latest, ubuntu-20.04, windows-latest]
        images: [hello-world, alpine]
        exclude:
          - images: alpine
            os: windows-latest
        include:
          - images: node
            os: ubuntu-latest
    name: Build Application - ${{ matrix.os }} - ${{ matrix.images }}
    runs-on: ${{ matrix.os }}
    steps:
    - name: print docker info
      run: docker info
